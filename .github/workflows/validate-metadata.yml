# 1. Branch-Protection auf `main` aktivieren — User-Aktion via GitHub-UI:
#    Settings -> Branches -> Branch protection rules -> Require status checks
#    -> Add "validate" als required check.
# 2. Optional: same workflow als Required Check fuer alle PRs.
