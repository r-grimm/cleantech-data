# Validate-Metadata Workflow — Vorlage fuer cleantech-data Repo
#
# Pre-Welle-0 U0e (Vorlage). Wird in Welle 1 (cleantech-data PR `feat/agent-first-schema-reset`)
# als `.github/workflows/validate-metadata.yml` ins cleantech-data Repo eingecheckt.
#
# Zweck: CI-Validation aller Sidecars gegen das von chart-engine exportierte JSON-Schema.
# Faengt Schema-Verletzungen ab, die dem lokalen Pre-Commit-Hook entkommen sind
# (Web-UI-Edits, Bot-Commits ohne Hook, etc. — siehe Adversarial-Review B3).
#
# WICHTIG vor Welle 1 PR:
# - chart-engine-export-schema CLI muss in einem installierbaren Distributable verfuegbar sein.
#   Pre-Welle-0 erlaubt Pip-Install via lokalen Pfad ODER via Wheel-Build im CI.
#   Aktuell hat chart-engine path-Dependencies (`tool.uv.sources`); CI muss daher entweder
#   das newsroom-Repo als Submodul/Sister-Checkout haben ODER ein vorgebautes Wheel.
# - Konkrete Install-Strategie wird in U16 (Welle 4 newsroom-Branch) endgueltig entschieden.
#   Pre-Welle-0 stellt sicher dass die CLI selbst funktioniert.

name: Validate Metadata

on:
  push:
    paths:
      - "data/**/*.meta.json"
      - "schemas/**/*.json"
  pull_request:
    paths:
      - "data/**/*.meta.json"
      - "schemas/**/*.json"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cleantech-data
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install jsonschema
        run: |
          python -m pip install --upgrade pip
          pip install "jsonschema>=4.20.0,<5.0"

      - name: Validate sidecars against schema
        run: |
          python <<'PY'
          import json
          import sys
          from pathlib import Path

          import jsonschema

          schema_path = Path("schemas/dataset_meta.schema.json")
          if not schema_path.exists():
              print("ERROR: schemas/dataset_meta.schema.json missing.")
              print("In Welle 1, this file is generated by:")
              print("  python -m chart_engine.cli.export_json_schema --output schemas/dataset_meta.schema.json")
              print("and committed to the repo.")
              sys.exit(1)

          schema = json.loads(schema_path.read_text(encoding="utf-8"))
          sidecar_files = sorted(Path("data").rglob("*.meta.json"))
          if not sidecar_files:
              print("WARN: no sidecars found.")
              sys.exit(0)

          errors = []
          for sidecar in sidecar_files:
              payload = json.loads(sidecar.read_text(encoding="utf-8"))
              try:
                  jsonschema.validate(instance=payload, schema=schema)
              except jsonschema.ValidationError as exc:
                  errors.append((str(sidecar), exc.message))

          if errors:
              print(f"FAILED: {len(errors)} sidecar(s) violate schema:")
              for path, message in errors:
                  print(f"  - {path}: {message}")
              sys.exit(1)
          print(f"OK: {len(sidecar_files)} sidecars valid.")
          PY

