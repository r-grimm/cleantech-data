# CI gate: every sidecar must validate against the chart-engine-exported
# JSON-Schema in schemas/. Same script the pre-commit hook runs locally —
# single source of truth, no format drift between local and CI errors.

name: Validate Metadata

on:
  push:
    paths:
      - "data/**/*.meta.json"
      - "schemas/**/*.json"
  pull_request:
    paths:
      - "data/**/*.meta.json"
      - "schemas/**/*.json"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cleantech-data
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install jsonschema
        run: |
          python -m pip install --upgrade pip
          pip install "jsonschema>=4.20.0,<5.0"

      - name: Validate sidecars against schema
        run: python scripts/validate_metadata.py
