name: Build Charts Index

on:
  push:
    branches: [main]
    paths:
      - "charts/**/chart.meta.json"
      - "scripts/build_charts_index.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-charts-index:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    concurrency:
      group: build-charts-index
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build charts index
        run: python scripts/build_charts_index.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog/charts_index.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: rebuild charts_index.json [skip ci]"
            git push || (git pull --rebase && git push)
          fi
