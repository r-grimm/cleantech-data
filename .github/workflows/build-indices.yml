name: Build Indices

on:
  push:
    branches: [main]
    paths:
      - "data/**/*.meta.json"
      - "scripts/build_indices.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-indices:
    runs-on: ubuntu-latest
    concurrency:
      group: build-indices
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build indices
        run: python scripts/build_indices.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog/by_tag.json catalog/by_source.json catalog/by_period.json catalog/by_topic.json catalog/active_index.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: rebuild catalog indices [skip ci]"
            git push || (git pull --rebase && git push)
          fi
