# Pre-Commit hooks for cleantech-data (Welle 1 U1).
#
# Install once per clone:
#   pip install pre-commit jsonschema
#   pre-commit install
#
# The hook validates every staged .meta.json against schemas/dataset_meta.schema.json
# (exported from chart-engine's Pydantic model). A second pass catches missing schema
# files. CI runs the same check via .github/workflows/validate-metadata.yml.

repos:
  - repo: local
    hooks:
      - id: validate-metadata
        name: Validate sidecar metadata against JSON-Schema
        entry: python scripts/validate_metadata.py
        language: system
        pass_filenames: true
        files: '^data/.*\.meta\.json$'
      - id: schema-present
        name: Ensure schemas/dataset_meta.schema.json exists
        entry: python -c "import sys, pathlib; p=pathlib.Path('schemas/dataset_meta.schema.json'); sys.exit(0 if p.exists() else 1)"
        language: system
        pass_filenames: false
        always_run: true
      - id: validate-data
        name: Detect fake/duplicate CSV bodies (Welle 4 U15)
        entry: python scripts/validate_data.py
        language: system
        pass_filenames: true
        files: '^data/.*\.csv$'
